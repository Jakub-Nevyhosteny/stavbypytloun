<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no, address=no, email=no">
  <title>Stránka nenalezena — PYTLOUNSTAV s.r.o.</title>
  <link rel="icon" type="image/png" sizes="32x32" href="media/logo.png">
  <link rel="icon" type="image/png" sizes="192x192" href="media/logo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="media/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--warm);
      padding: 40px 24px;
      text-align: center;
    }
    .error-code {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--yellow);
      margin-bottom: 0;
    }
    .error-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: var(--dark);
      margin-top: 8px;
      margin-bottom: 16px;
    }
    .error-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 40px;
    }
    .error-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--yellow);
      color: var(--dark);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .error-back:hover {
      background: #f5a520;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Stránka nenalezena</h1>
    <p class="error-desc">Omlouváme se, stránka kterou hledáte neexistuje nebo byla přesunuta.</p>
    <a href="/" class="error-back">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Zpět na hlavní stránku
    </a>
  </div>
</body>
</html>
